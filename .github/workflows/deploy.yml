name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Wait for Hostinger auto-deploy to finish
        run: sleep 120

      - name: Deploy to Hostinger via LFTP (Alpine)
        timeout-minutes: 5
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:latest sh -c "
            apk add --no-cache lftp &&
            lftp -c \"
              set ssl:verify-certificate no;
              set ftp:ssl-allow no;
              set ftp:passive-mode true;
              set ftp:auto-passive-mode yes;
              set dns:fatal-timeout 15;
              set net:timeout 15;
              set net:max-retries 10;
              set net:reconnect-interval-base 5;
              set net:connection-limit 1;
              set xfer:use-temp-file no;
              set xfer:clobber true;
              set cmd:trace true;
              open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
              mirror -R --verbose --no-perms --parallel=1 --exclude-glob .git* --exclude-glob node_modules --exclude-glob whisper_server.py --exclude-glob start_whisper.bat --exclude-glob '*.pyc' ./dist/ ./;
              exit 0;
            \" || echo 'LFTP encountered an issue but proceeding'
          "
