name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Prepare deployment payload
        run: |
          mkdir -p deploy_payload/tmp
          touch deploy_payload/tmp/restart.txt
          cp server.js package.json deploy_payload/
          cp -r dist deploy_payload/

      - name: Deploy to Hostinger via LFTP (Alpine)
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace alpine:latest sh -c "
            apk add --no-cache lftp &&
            lftp -c \"
              set ssl:verify-certificate no;
              set net:timeout 15;
              set net:max-retries 3;
              set net:reconnect-interval-base 5;
              set net:connection-limit 1;
              set ftp:ssl-allow yes;
              set xfer:use-temp-file no;
              set xfer:clobber true;
              open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }};
              mirror -R --verbose --no-perms --parallel=1 ./deploy_payload/ ./
            \"
          "
